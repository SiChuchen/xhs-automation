# 小红书自动化系统日志轮转配置
/home/ubuntu/xhs-automation/logs/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 0640 ubuntu ubuntu
    sharedscripts
    postrotate
        # 重启systemd服务以重新打开日志文件
        systemctl restart xhs-automation.service > /dev/null 2>&1 || true
    endscript
}

# 告警日志单独处理
/home/ubuntu/xhs-automation/logs/alerts.log {
    daily
    missingok
    rotate 90
    compress
    delaycompress
    notifempty
    create 0640 ubuntu ubuntu
    sharedscripts
    postrotate
        # 不需要重启服务，告警日志独立
    endscript
}

# Docker容器日志（如果存储在本地）
/tmp/xhs-official/logs/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 ubuntu ubuntu
    sharedscripts
    postrotate
        # 重启Docker容器
        docker restart xhs-official > /dev/null 2>&1 || true
    endscript
}